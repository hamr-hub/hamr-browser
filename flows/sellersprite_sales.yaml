id: sellersprite_sales
name: SellerSprite 销量估算
description: 查询指定 ASIN 在指定站点的月销量估算数据，无需手动登录

parameters:
  - name: asin
    type: string
    required: true
    description: 亚马逊 ASIN 编码
    example: B0D81C6WGH
  - name: market
    type: string
    required: true
    description: 站点代码（US/UK/DE/JP/FR/CA/IT/ES）
    example: UK

auth:
  check:
    type: navigate_and_check
    url: "https://www.sellersprite.com/cn/w/user/login"
    logged_in_indicator:
      type: url_not_contains
      value: "/login"
  login:
    steps:
      - type: navigate
        url: "https://www.sellersprite.com/cn/w/user/login"
        wait_until: networkidle
      - type: screenshot
        value: "./logs/login_page.png"
      - type: wait_for_selector
        selector: "input[name='email']"
        timeout: 15000
      - type: fill
        selector: "input[name='email']"
        value: "{{ _auth.username }}"
      - type: fill
        selector: "input[type='password']"
        value: "{{ _auth.password }}"
      - type: screenshot
        value: "./logs/login_before_submit.png"
      - type: click
        selector: "button[type='submit']"
      - type: wait
        milliseconds: 6000
      - type: screenshot
        value: "./logs/login_after_submit.png"
  secrets_key: sellersprite

steps:
  - type: navigate
    url: "https://www.sellersprite.com/v2/tools/sales-estimator?market={{ market }}&asin={{ asin }}"
    wait_until: domcontentloaded

capture:
  type: wait_for_response
  url_pattern: "**/v2/tools/sales-estimator/asin.json**"
  method: POST
  timeout: 30000
  extract:
    type: jsonpath
    path: "$"
  on_timeout: error
