services:
  hamr-browser:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./browser_profile:/app/browser_profile
      - ./flows:/app/flows
      - ./logs:/app/logs
      - ./secrets.yaml:/app/secrets.yaml:ro
    environment:
      - HAMR_BROWSER_HEADLESS=true
      - HAMR_FLOW_TIMEOUT=60
    shm_size: "2gb"
    restart: unless-stopped
